site_name: Curso HCI
site_description: High-Content Imaging & Analysis — material de consulta
site_url: https://labnanocell.github.io/curso-hci/

theme:
  name: material
  language: pt
  logo: assets/img/nanocell-logo.png
  favicon: assets/img/nanocell-logo.ico
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    # - navigation.instant
    - navigation.tracking
    - navigation.sections
    # - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true
      smart_dollar: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

nav:
  - Início: index.md
  - Onboarding:
      - Visão geral: 00-onboarding/index.md
      - 00.1 Pergunta biológica: 00-onboarding/pergunta/index.md
      - 00.2 Desenho experimental: 00-onboarding/desenho-experimental/index.md
      - 00.3 Batch effects: 00-onboarding/batch-effects/index.md
  - 90 Glossário: 90-glossario/index.md
