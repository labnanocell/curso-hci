site_name: Curso HCI
site_url: https://labnanocell.github.io/curso-hci/

theme:
  name: material
  logo: assets/img/nanocell-logo.png
  favicon: assets/img/favicon.ico
  language: pt
  features:
    - navigation.prune
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/ui.js

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: false
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: pt
          name: Português
          default: true
          build: true
          nav:
            - Início: index.md
            - Onboarding e Higiene Científica:
                - Visão geral: 00-onboarding/index.md
