site_name: Curso HCI
site_description: High-Content Imaging & Analysis — material de consulta
site_url: https://labnanocell.github.io/curso-hci/

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css
