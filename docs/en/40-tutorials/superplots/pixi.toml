[workspace]
name = "superplots-tutorial"
version = "0.1.0"
description = "Minimal environment for plotting complete datasets and SuperPlots"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.10,<3.13"
pandas = ">=2.0"
numpy = ">=1.24"
matplotlib = ">=3.7"
seaborn = ">=0.12"
scipy = ">=1.11"
ipykernel = ">=6.0"
jupyterlab = ">=4.0"

[tasks]
notebook = "jupyter lab"